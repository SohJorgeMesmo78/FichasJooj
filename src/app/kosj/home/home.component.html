<div class="home-container">
  <div style="width: 100%; display: flex; justify-content: flex-start; margin-bottom: 20px;">
    <a routerLink="/" class="dnd-back-button" style="font-size: 0.8rem; padding: 0.4rem 0.8rem;">← Escolher Personagem</a>
  </div>

  <div class="avatar-section">
    <div class="avatar-frame">
      <img src="assets/kosj/kosj_avatar_redondo.png" alt="Kosj Avatar" class="avatar-image">
    </div>
    <h1 class="dnd-page-title character-name">Kosj</h1>
  </div>

  <div class="cards-grid">
    <a routerLink="/kosj/historia" class="nav-card">
      <div class="card-icon">📜</div>
      <div class="card-content">
        <h2>História</h2>
        <p>A origem e a jornada do herói...</p>
      </div>
    </a>

    <a routerLink="/kosj/ficha" class="nav-card">
      <div class="card-icon">⚔️</div>
      <div class="card-content">
        <h2>Ficha</h2>
        <p>Atributos, habilidades e conhecimentos...</p>
      </div>
    </a>

    <!-- Em construção: usando click (event preventDefault pra não ir pro link vazio por enquanto) -->
    <a routerLink="/kosj/lacos" class="nav-card">
      <div class="card-icon">👥</div>
      <div class="card-content">
        <h2>Laços</h2>
        <p>Família, aliados e inimigos destas terras...</p>
      </div>
    </a>
  </div>

  <div class="section-divider">
    <span>Informações Gerais</span>
  </div>

  <div class="mini-cards-section">
    <a routerLink="/kosj/raca" class="mini-card" style="text-decoration: none; display: flex; flex-direction: column; cursor: pointer;">
      <span class="mini-label">Raça:</span> 
      <span class="mini-value">Homem Lagarto</span>
    </a>
    <a routerLink="/kosj/classe" class="mini-card" style="text-decoration: none; display: flex; flex-direction: column; cursor: pointer;">
      <span class="mini-label">Classe/Subclasse:</span> 
      <span class="mini-value">Monge do Caminho do Eu Astral</span>
    </a>
  </div>

  <!-- Toast de Notificação -->
  <div class="toast-container" [class.show]="toastMessage">
    <div class="toast-content">{{ toastMessage }}</div>
  </div>
</div>
